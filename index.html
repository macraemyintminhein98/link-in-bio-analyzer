<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Link-in-Bio Analyzer</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-gray-100 flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-lg shadow-md max-w-md w-full text-center"><h1 class="text-3xl font-bold mb-6">Analyze Your Link-in-Bio</h1><p class="mb-6 text-gray-700">Optimize your digital presence. Get actionable insights now.</p><input id="linkInput" type="url" placeholder="Enter your Link-in-Bio URL (e.g., linktr.ee/yourname)" class="w-full p-3 border border-gray-300 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"><button id="analyzeButton" class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition-colors"><span id="buttonText">Analyze Now ($9.99)</span><span id="spinner" class="hidden animate-spin h-5 w-5 border-4 border-white border-solid rounded-full border-t-transparent mx-auto"></span></button><div id="result" class="mt-6 text-left hidden"><h2 class="text-2xl font-semibold mb-2">Analysis Report</h2><p id="reportContent"></p><button id="closeReport" class="mt-4 bg-gray-300 text-gray-800 p-2 rounded hover:bg-gray-400">Analyze Another</button></div><div id="error" class="mt-4 text-red-600 hidden"></div></div><script>document.getElementById('analyzeButton').addEventListener('click', async () => {const linkInput = document.getElementById('linkInput');const url = linkInput.value;const buttonText = document.getElementById('buttonText');const spinner = document.getElementById('spinner');const errorDiv = document.getElementById('error');const resultDiv = document.getElementById('result');const reportContent = document.getElementById('reportContent');errorDiv.classList.add('hidden');resultDiv.classList.add('hidden');if (!url) {errorDiv.innerText = 'Please enter a URL.';errorDiv.classList.remove('hidden');return;}buttonText.classList.add('hidden');spinner.classList.remove('hidden');try {// Simulate Stripe Checkout and API call (in a real app, this would redirect or open a modal)console.log('Simulating payment for:', url);await new Promise(resolve => setTimeout(resolve, 2000)); // Simulate payment processing// Simulate API response, full report content would go hereconst mockReport = `<h3>Your Analysis Score: 85/100</h3><p><strong>Broken Links:</strong> 0 found. Great!</p><p><strong>Slow-Loading Pages:</strong> 1 found (example.com/slow-page). Consider optimizing image sizes.</p><p><strong>Duplicate Content:</strong> None detected!</p><p><strong>Suggested Content:</strong> Based on your links, consider adding content about 'Productivity Tools' or 'Wellness Tips' to engage your audience further.</p>`;reportContent.innerHTML = mockReport;resultDiv.classList.remove('hidden');} catch (e) {errorDiv.innerText = 'An error occurred. Please try again.';errorDiv.classList.remove('hidden');} finally {buttonText.classList.remove('hidden');spinner.classList.add('hidden');}});document.getElementById('closeReport').addEventListener('click', () => {document.getElementById('linkInput').value = '';document.getElementById('result').classList.add('hidden');});</script></body></html>
